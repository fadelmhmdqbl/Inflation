<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Inflation Data</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="kpi-bar">
            <div class="kpi">KPI 1: Value</div>
            <div class="kpi">KPI 2: Value</div>
        </div>
        <nav>
            <ul class="tab-navigation">
                <li><a href="#demand" onclick="switchTab('demand')">Demand/CPI/Expectations</a></li>
                <li><a href="#production" onclick="switchTab('production')">Production/PPI/Labor</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="demand" class="tab-content">
            <h1>Demand/CPI/Expectations</h1>
            <canvas id="cpiChart"></canvas>
            <canvas id="beiChart"></canvas>
            <script>
                // Data arrays for all metrics through Mar-26
                const cpiData = [...];
                const beiData = [...];
                const realYieldsData = [...];
                // Other data arrays omitted for brevity

                // Chart initialization code
                const cpiCtx = document.getElementById('cpiChart').getContext('2d');
                const cpiChart = new Chart(cpiCtx, {
                    type: 'line',
                    data: {
                        labels: [...], // X-axis labels
                        datasets: [{
                            label: 'CPI',
                            data: cpiData,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true } } }
                });
            </script>
        </div>
        <div id="production" class="tab-content hidden">
            <h1>Production/PPI/Labor</h1>
            <canvas id="ppiChart"></canvas>
            <script>
                // Chart initialization code for PPI
                const ppiCtx = document.getElementById('ppiChart').getContext('2d');
                const ppiChart = new Chart(ppiCtx, {
                    type: 'bar',
                    data: {
                        labels: [...], // X-axis labels
                        datasets: [{
                            label: 'PPI',
                            data: [...], // PPI data
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: { scales: { y: { beginAtZero: true } } }
                });
            </script>
        </div>
    </main>
    <script>
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
        }
    </script>
    <footer>
        <p>Data updated via Anthropic API integration.</p>
    </footer>
</body>
</html>
